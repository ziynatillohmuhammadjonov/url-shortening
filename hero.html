<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortly - URL Shortener</title>
    <link rel="stylesheet" href="styles/hero.css">
    <link rel="stylesheet" href="styles/base.css">
</head>

<body>

    <section class="hero-section">
        <div class="container hero-container">
            <div class="hero-content">
                <h1 class="hero-title">More than just shorter links</h1>
                <p class="hero-subtitle">Build your brand’s recognition and get detailed insights on how your links are
                    performing.</p>
                <a href="#" class="btn-cyan btn-round">Get Started</a>
            </div>
            <div class="hero-image">
                <img src="img/working_with_computer.svg" alt="Illustration Working" class="hero-img">
            </div>
        </div>
    </section>

    <section class="statistics-section">
        <div class="container">

            <div class="shorten-form-box">
                <div class="input-wrapper">
                    <input type="text" placeholder="Shorten a link here..." class="shorten-input">
                    <span class="error-text">Please add a link</span>
                </div>
                <button class="btn-cyan btn-square">Shorten It!</button>
            </div>

            <div class="results-container">

                <div class="result-card">
                    <span class="original-url">https://www.frontendmentor.io</span>
                    <div class="result-right">
                        <span class="shortened-url">https://rel.ink/k4Kyk</span>
                        <button class="btn-copy">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
